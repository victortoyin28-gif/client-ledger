<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563EB">
<title>Client Ledger</title>
<link rel="manifest" href="manifest.jsonon">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body { font-family: 'Inter', system-ui, sans-serif; background: #F9FAFB; }
.card { background: white; border-radius: 1rem; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); padding: 1.25rem; }
.btn-primary { background: #2563EB; color: white; border-radius: 0.75rem; padding: 0.75rem; font-weight: 500; }
.btn-primary:hover { background: #1D4ED8; }
.input { width: 100%; border: 1px solid #D1D5DB; border-radius: 0.75rem; padding: 0.75rem 1rem; outline: none; }
.input:focus { box-shadow: 0 0 0 2px #3B82F6; }
</style>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div><div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const DB = {
  getUsers: () => JSON.parse(localStorage.getItem('users') || '[]'),
  saveUsers: (u) => localStorage.setItem('users', JSON.stringify(u)),
  getSession: () => JSON.parse(localStorage.getItem('session') || 'null'),
  setSession: (u) => localStorage.setItem('session', JSON.stringify(u)),
  clearSession: () => localStorage.removeItem('session'),
  addLedger: (username, action) => {
    const ledger = JSON.parse(localStorage.getItem('ledger') || '{}');
    ledger[username] = ledger[username] || [];
    ledger[username].unshift({ action, time: new Date().toISOString(), id: Date.now() });
    localStorage.setItem('ledger', JSON.stringify(ledger));
  },
  getLedger: (username) => JSON.parse(localStorage.getItem('ledger') || '{}')[username] || []
};
function App() {
  const [page, setPage] = useState('login');
  const [user, setUser] = useState(DB.getSession());
  const [tab, setTab] = useState('home');
  useEffect(() => { if(user) setPage('dashboard') }, );
  const login = (username, password) => {
    const found = DB.getUsers().find(u => u.username === username && u.password === password);
    if(found) { DB.setSession(found); DB.addLedger(username, '📱 Login'); setUser(found); setPage('dashboard'); } else alert('Invalid credentials');
  }
  const signup = (username, email, password) => {
    const users = DB.getUsers();
    if(users.find(u => u.username === username)) return alert('Username exists');
    if(users.find(u => u.email === email)) return alert('Email already in use');
    const newUser = {username, email, password, created: new Date().toISOString()};
    users.push(newUser); DB.saveUsers(users); DB.addLedger(username, '✅ Account Created');
    alert('Account created. Login now.'); setPage('login');
  }
  const resetPassword = (email, newPass) => {
    const users = DB.getUsers();
    const idx = users.findIndex(u => u.email === email);
    if(idx === -1) return alert('No account found with that Gmail');
    users[idx].password = newPass; DB.saveUsers(users); DB.addLedger(users[idx].username, '🔑 Password Changed');
    alert('Password updated. Login with new password.'); setPage('login');
  }
  const logout = () => {
    DB.addLedger(user.username, '🚪 Logged Out'); DB.clearSession(); setUser(null); setPage('login'); setTab('home');
  }
  if(page === 'login') return <Login onLogin={login} onForgot={() => setPage('forgot')} onSignup={() => setPage('signup')} />;
  if(page === 'signup') return <Signup onSignup={signup} onBack={() => setPage('login')} />;
  if(page === 'forgot') return <Forgot onReset={resetPassword} onBack={() => setPage('login')} />;
  if(page === 'dashboard') return <Dashboard user={user} tab={tab} setTab={setTab} onLogout={logout} />;
}
function Login({onLogin, onForgot, onSignup}) {
  const [u, setU] = useState(''); const [p, setP] = useState('');
  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="w-full max-w-sm card">
        <div className="text-center text-4xl mb-4">🔒</div>
        <h1 className="text-2xl font-bold text-center mb-6">Client Ledger</h1>
        <input className="input mb-3" placeholder="Username" value={u} onChange={e => setU(e.target.value)} />
        <input className="input mb-4" type="password" placeholder="Password" value={p} onChange={e => setP(e.target.value)} />
        <button className="btn-primary w-full mb-3" onClick={() => onLogin(u, p)}>Login</button>
        <div className="flex justify-between text-sm text-blue-600">
          <button onClick={onForgot}>Forgot?</button>
          <button onClick={onSignup}>Sign up</button>
        </div>
      </div>
    </div>
  );
}
function Signup({onSignup, onBack}) {
  const [u, setU] = useState(''); const [e, setE] = useState(''); const [p, setP] = useState('');
  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="w-full max-w-sm card">
        <h1 className="text-2xl font-bold mb-6">Create Client Ledger Account</h1>
        <input className="input mb-3" placeholder="Username" onChange={e => setU(e.target.value)} />
        <input className="input mb-3" placeholder="Gmail" type="email" onChange={e => setE(e.target.value)} />
        <input className="input mb-4" type="password" placeholder="Password 8+ chars" onChange={e => setP(e.target.value)} />
        <button className="btn-primary w-full mb-3" onClick={() => onSignup(u, e, p)}>Create Account</button>
        <button className="text-sm text-blue-600 w-full" onClick={onBack}>Have an account? Login</button>
      </div>
    </div>
  );
}
function Forgot({onReset, onBack}) {
  const [step, setStep] = useState(1);
  const [email, setEmail] = useState('');
  const [p1, setP1] = useState(''); const [p2, setP2] = useState('');
  const submitEmail = () => setStep(2);
  const submitPass = () => {
    if(p1!== p2) return alert('Passwords do not match');
    if(p1.length < 8) return alert('Min 8 chars');
    onReset(email, p1);
  }
  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="w-full max-w-sm card">
        <button onClick={onBack} className="text-blue-600 mb-4">← Back</button>
        {step === 1?
          <>
            <h1 className="text-2xl font-bold mb-6">Reset Password</h1>
            <input className="input mb-4" placeholder="Enter your Gmail" type="email" onChange={e => setEmail(e.target.value)} />
            <button className="btn-primary w-full" onClick={submitEmail}>Continue</button>
          </>
          :
          <>
            <h1 className="text-xl font-bold mb-2">Set New Password</h1>
            <p className="text-sm text-gray-500 mb-4">For: {email}</p>
            <input className="input mb-3" type="password" placeholder="New Password" onChange={e => setP1(e.target.value)} />
            <input className="input mb-4" type="password" placeholder="Confirm Password" onChange={e => setP2(e.target.value)} />
            <button className="btn-primary w-full" onClick={submitPass}>Save New Password</button>
          </>
        }
      </div>
    </div>
  );
}
function Dashboard({user, tab, setTab, onLogout}) {
  const Nav = () => (
    <div className="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2">
      {['home','profile','ledger','settings'].map(t =>
        <button key={t} onClick={() => setTab(t)} className={`text-sm capitalize ${tab===t? 'text-blue-600 font-bold' : 'text-gray-500'}`}>{t}</button>
      )}
    </div>
  );
  return (
    <div className="min-h-screen pb-20">
      <div className="p-4">
        {tab === 'home' && <Home user={user} />}
        {tab === 'profile' && <Profile user={user} />}
        {tab === 'ledger' && <Ledger user={user} />}
        {tab === 'settings' && <Settings user={user} onLogout={onLogout} />}
      </div>
      <Nav />
    </div>
  );
}
function Home({user}) {
  return (
    <div className="space-y-4">
      <h1 className="text-2xl font-bold">Hi, {user.username} 👋</h1>
      <div className="card">
        <h2 className="font-semibold mb-2">Client Ledger</h2>
        <div className="text-sm text-gray-600">Your private client records</div>
      </div>
      <div className="card">
        <h2 className="font-semibold mb-2">Recent Activity</h2>
        {DB.getLedger(user.username).length === 0?
          <div className="text-sm text-gray-500">No activity yet</div> :
          DB.getLedger(user.username).slice(0,2).map(l =>
            <div key={l.id} className="text-sm py-1">{l.action}</div>
          )
        }
      </div>
    </div>
  );
}
function Profile({user}) {
  return (
    <div className="card space-y-3">
      <h1 className="text-xl font-bold">Profile</h1>
      <div className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center text-white text-2xl mx-auto">
        {user.username.slice(0,2).toUpperCase()}
      </div>
      <div className="text-center font-semibold">{user.username}</div>
      <div className="text-center text-gray-500 text-sm">{user.email}</div>
      <div className="border-t pt-3 text-sm space-y-2">
        <div><b>Username:</b> {user.username}</div>
        <div><b>Gmail:</b> {user.email}</div>
        <div><b>Member since:</b> {new Date(user.created).toLocaleDateString()}</div>
        <div><b>Status:</b> Active</div>
      </div>
    </div>
  );
}
function Ledger({user}) {
  const [jobs, setJobs] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [filter, setFilter] = useState('');
  const [form, setForm] = useState({date: '', name: '', phone: '', address: '', desc: ''});
  useEffect(() => {
    const saved = JSON.parse(localStorage.getItem(`jobs_${user.username}`) || '[]');
    setJobs(saved);
  }, [user.username]);
  useEffect(() => {
    localStorage.setItem(`jobs_${user.username}`, JSON.stringify(jobs));
  }, [jobs, user.username]);
  const filteredJobs = jobs.filter(j =>
    j.name.toLowerCase().includes(filter.toLowerCase()) ||
    j.desc.toLowerCase().includes(filter.toLowerCase())
  );
  const addJob = () => {
    if(!form.name ||!form.date ||!form.desc) return alert('Name, Date, Description required');
    const newJob = { id: Date.now(),...form };
    setJobs([newJob,...jobs]);
    setForm({date: '', name: '', phone: '', address: '', desc: ''});
    setShowForm(false);
    DB.addLedger(user.username, `📝 New Job: ${form.desc}`);
  };
  const deleteJob = (id) => {
    if(confirm('Delete this job?')) {
      setJobs(jobs.filter(j => j.id!== id));
      DB.addLedger(user.username, `🗑️ Job Deleted`);
    }
  };
  return (
    <div className="space-y-3">
      <div className="flex justify-between items-center">
        <h1 className="text-xl font-bold">Client Ledger</h1>
        <button onClick={() => setShowForm(true)} className="btn-primary px-4 py-2 text-sm">+ New Job</button>
      </div>
      <input className="input" placeholder="Search client or service..." value={filter} onChange={e => setFilter(e.target.value)} />
      {filteredJobs.length === 0?
        <div className="card text-center text-gray-500 py-8">
          <div className="text-4xl mb-2">📋</div>
          No jobs yet<br/>
          <span className="text-sm">Tap + New Job to add your first client</span>
        </div> :
        filteredJobs.map(job =>
          <div key={job.id} className="card">
            <div className="flex justify-between items-start mb-2">
              <div className="font-semibold">{job.name}</div>
              <button onClick={() => deleteJob(job.id)} className="text-red-500 text-xs">Delete</button>
            </div>
            <div className="text-sm text-gray-600">{job.desc}</div>
            <div className="text-xs text-gray-500 mt-2 space-y-1">
              <div>📅 {job.date}</div>
              {job.phone && <div>📞 {job.phone}</div>}
              {job.address && <div>📍 {job.address}</div>}
            </div>
          </div>
        )
      }
      {showForm &&
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
          <div className="card w-full max-w-sm space-y-3">
            <h2 className="text-lg font-bold">Add New Job</h2>
            <input className="input" placeholder="Date DD/MM/YYYY" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
            <input className="input" placeholder="Client Name" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
            <input className="input" placeholder="Phone Number" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} />
            <input className="input" placeholder="Address" value={form.address} onChange={e => setForm({...form, address: e.target.value})} />
            <input className="input" placeholder="Description" value={form.desc} onChange={e => setForm({...form, desc: e.target.value})} />
            <div className="flex gap-2">
              <button onClick={() => setShowForm(false)} className="flex-1 py-3 border rounded-xl">Cancel</button>
              <button onClick={addJob} className="flex-1 btn-primary">Save</button>
            </div>
          </div>
        </div>
      }
    </div>
  );
}
function Settings({user, onLogout}) {
  return (
    <div className="space-y-4">
      <div className="card">
        <h2 className="font-semibold mb-2">Security</h2>
        <div className="text-sm text-gray-600 py-2">Change Password</div>
        <div className="text-sm text-gray-600 py-2">Active Sessions</div>
      </div>
      <div className="card">
        <h2 className="font-semibold mb-2">Preferences</h2>
        <div className="text-sm text-gray-600 py-2">Theme: Light</div>
      </div>
      <button onClick={onLogout} className="w-full card text-red-600 font-medium">Logout</button>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script src="script.js"></script>
</body>
</html>
